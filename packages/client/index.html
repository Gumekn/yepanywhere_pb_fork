<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content, viewport-fit=cover" />
    <title>Yep Anywhere</title>
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1a2e" />
    <style>
      /* Critical CSS to prevent flash of white background - only html, body/root handled by main CSS */
      html { background-color: #181818; }
      html[data-theme="light"] { background-color: #faf9f5; }
      html[data-theme="dark"] { background-color: #2f2f2f; }
      @media (prefers-color-scheme: light) {
        html:not([data-theme]) { background-color: #faf9f5; }
      }

      /* Inline splash — see remote.html for rationale. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #181818;
        color: #b8b8b8;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        transition: opacity 0.35s ease-out;
        pointer-events: auto;
      }
      html[data-theme="light"] #splash { background: #faf9f5; color: #555; }
      html[data-theme="dark"] #splash { background: #2f2f2f; color: #b8b8b8; }
      html[data-mobile-shell="true"] #splash { display: none; }
      #splash.is-hiding { opacity: 0; pointer-events: none; }
      #splash-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(120, 120, 120, 0.25);
        border-top-color: #7fd17f;
        border-radius: 50%;
        animation: splash-spin 0.85s linear infinite;
      }
      #splash-label {
        font-size: 13px;
        letter-spacing: 0.5px;
        opacity: 0.7;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash-spinner { animation: none; }
        #splash { transition: opacity 0.15s linear; }
      }
    </style>
    <script>
      // Apply theme before page renders to prevent flash.
      (function() {
        var params = new URLSearchParams(window.location.search);
        var mobileShellStorageKey = 'yep-anywhere-mobile-shell';
        var mobileShellParam = params.get('yep-mobile-shell');
        var isAndroidFrame = false;

        try {
          isAndroidFrame = window.parent !== window && /Android|wv/i.test(window.navigator.userAgent);
        } catch (_) {
          isAndroidFrame = /Android|wv/i.test(window.navigator.userAgent);
        }

        var isMobileShell = mobileShellParam === '1' || isAndroidFrame;

        if (isMobileShell) {
          try {
            sessionStorage.setItem(mobileShellStorageKey, '1');
          } catch (_) {}
        } else {
          try {
            isMobileShell = sessionStorage.getItem(mobileShellStorageKey) === '1';
          } catch (_) {}
        }

        if (isMobileShell) {
          document.documentElement.setAttribute('data-mobile-shell', 'true');
        }

        if (mobileShellParam !== null) {
          params.delete('yep-mobile-shell');
          var query = params.toString();
          window.history.replaceState(
            null,
            '',
            window.location.pathname + (query ? '?' + query : '') + window.location.hash
          );
        }

        var stored = localStorage.getItem('yep-anywhere-theme');
        var theme = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'verydark');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="splash" aria-label="Loading">
      <div id="splash-spinner" aria-hidden="true"></div>
      <div id="splash-label">Yep Anywhere</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
