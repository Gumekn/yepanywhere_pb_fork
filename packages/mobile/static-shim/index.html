<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Yep Anywhere</title>
    <link rel="dns-prefetch" href="//air.yueyuan.uk" />
    <link rel="preconnect" href="https://air.yueyuan.uk" crossorigin />
    <script src="./loader.js" defer></script>
    <style>
      html { height: 100%; color-scheme: light dark; }
      /* Android draws edge-to-edge. Chromium only exposes env(safe-area-inset-*)
         to the top-level document (this shim), NOT to cross-origin iframes, so
         the app inside cannot pad itself. We inset only the TOP (status bar)
         here in the shell and paint that strip the app's light background so it
         blends with the UI. The bottom is intentionally NOT inset — the app
         runs full-height under the gesture nav bar (no black cut-off). */
      body {
        margin: 0;
        height: 100%;
        box-sizing: border-box;
        background: #faf9f5;
        color: #1f2937;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        overflow: hidden;
        padding-top: env(safe-area-inset-top);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      /* The Tauri shell lives at tauri.localhost; the server whitelists that
         origin in its CSP frame-ancestors. The app runs in the iframe's clean
         browser context, so Tauri's IPC injection (shell-only) never collides. */
      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #faf9f5;
        opacity: 0;
        transition: opacity 180ms ease;
      }

      .shell-loader {
        position: fixed;
        inset: 0;
        z-index: 2;
        display: grid;
        place-items: center;
        padding:
          env(safe-area-inset-top)
          env(safe-area-inset-right)
          env(safe-area-inset-bottom)
          env(safe-area-inset-left);
        background: #faf9f5;
        opacity: 1;
        visibility: visible;
        transition:
          opacity 180ms ease,
          visibility 180ms ease;
      }

      .shell-loader__content {
        display: grid;
        justify-items: center;
        gap: 16px;
      }

      .shell-loader__mark {
        display: grid;
        place-items: center;
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: #20242c;
        color: #ffffff;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0;
        box-shadow: 0 14px 34px rgba(32, 36, 44, 0.18);
      }

      .shell-loader__spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(32, 36, 44, 0.14);
        border-top-color: #20242c;
        border-radius: 999px;
        animation: shell-spin 760ms linear infinite;
      }

      .shell-loader__status {
        min-height: 20px;
        color: #5f6b7a;
        font-size: 14px;
        line-height: 20px;
      }

      body.is-loaded iframe {
        opacity: 1;
      }

      body.is-loaded .shell-loader {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      @keyframes shell-spin {
        to { transform: rotate(360deg); }
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #232323;
          color: #f4f4f5;
        }

        iframe {
          background: #232323;
        }

        .shell-loader {
          background: #232323;
        }

        .shell-loader__mark {
          background: #faf9f5;
          color: #20242c;
          box-shadow: 0 14px 34px rgba(0, 0, 0, 0.28);
        }

        .shell-loader__spinner {
          border-color: rgba(250, 249, 245, 0.16);
          border-top-color: #faf9f5;
        }

        .shell-loader__status {
          color: #c9ced6;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        iframe,
        .shell-loader {
          transition: none;
        }

        .shell-loader__spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell-loader" role="status" aria-live="polite">
      <div class="shell-loader__content">
        <div class="shell-loader__mark" aria-hidden="true">Y</div>
        <div class="shell-loader__spinner" aria-hidden="true"></div>
        <div class="shell-loader__status" data-loader-status>
          Loading Yep Anywhere
        </div>
      </div>
    </div>
    <iframe
      id="app-frame"
      src="https://air.yueyuan.uk/yep/"
      allow="clipboard-read; clipboard-write; microphone; camera; fullscreen"
      loading="eager"
      title="Yep Anywhere"
    ></iframe>
  </body>
</html>
