<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Yep Anywhere</title>
    <link rel="dns-prefetch" href="//43.226.60.75" />
    <link rel="dns-prefetch" href="//air.yueyuan.uk" />
    <link rel="preconnect" href="https://air.yueyuan.uk" crossorigin />
    <script src="./loader.js" defer></script>
    <style>
      html { height: 100%; color-scheme: light dark; }
      /* Android draws edge-to-edge. Chromium only exposes env(safe-area-inset-*)
         to the top-level document (this shim), NOT to cross-origin iframes, so
         the app inside cannot pad itself. We inset only the TOP (status bar)
         here in the shell and paint that strip the app's light background so it
         blends with the UI. The bottom is intentionally NOT inset — the app
         runs full-height under the gesture nav bar (no black cut-off). */
      body {
        margin: 0;
        height: 100%;
        box-sizing: border-box;
        background: #faf9f5;
        color: #1f2937;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        overflow: hidden;
        padding-top: env(safe-area-inset-top);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      /* The Tauri shell lives at tauri.localhost; the server whitelists that
         origin in its CSP frame-ancestors. The app runs in the iframe's clean
         browser context, so Tauri's IPC injection (shell-only) never collides. */
      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #faf9f5;
        opacity: 0;
        transition: opacity 180ms ease;
      }

      .shell-loader {
        position: fixed;
        inset: 0;
        z-index: 2;
        display: grid;
        place-items: center;
        padding:
          env(safe-area-inset-top)
          env(safe-area-inset-right)
          env(safe-area-inset-bottom)
          env(safe-area-inset-left);
        background: #faf9f5;
        opacity: 1;
        visibility: visible;
        transition:
          opacity 180ms ease,
          visibility 180ms ease;
      }

      .shell-loader__content {
        display: grid;
        justify-items: center;
        gap: 14px;
        width: calc(100% - 40px);
        max-width: 360px;
      }

      .shell-loader__mark {
        display: grid;
        place-items: center;
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: #20242c;
        color: #ffffff;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0;
        box-shadow: 0 14px 34px rgba(32, 36, 44, 0.18);
      }

      .shell-loader__spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(32, 36, 44, 0.14);
        border-top-color: #20242c;
        border-radius: 999px;
        animation: shell-spin 760ms linear infinite;
      }

      .shell-loader__status {
        min-height: 20px;
        color: #5f6b7a;
        font-size: 14px;
        line-height: 20px;
        text-align: center;
      }

      .shell-loader__node-form {
        display: grid;
        gap: 8px;
        width: 100%;
        margin-top: 2px;
      }

      .shell-loader__node-label {
        color: #374151;
        font-size: 12px;
        font-weight: 650;
        line-height: 16px;
      }

      .shell-loader__node-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        width: 100%;
      }

      .shell-loader__node-input {
        min-width: 0;
        height: 40px;
        box-sizing: border-box;
        border: 1px solid rgba(95, 107, 122, 0.24);
        border-radius: 8px;
        padding: 0 10px;
        background: rgba(255, 255, 255, 0.76);
        color: #20242c;
        font: inherit;
        font-size: 14px;
        outline: none;
      }

      .shell-loader__node-input:focus {
        border-color: #20242c;
        box-shadow: 0 0 0 3px rgba(32, 36, 44, 0.12);
      }

      .shell-loader__node-submit,
      .shell-loader__channel-button,
      .shell-loader__history-button {
        min-height: 36px;
        border: 1px solid rgba(95, 107, 122, 0.22);
        border-radius: 8px;
        padding: 0 12px;
        font: inherit;
        font-size: 13px;
        font-weight: 650;
        letter-spacing: 0;
        cursor: pointer;
      }

      .shell-loader__node-submit {
        height: 40px;
        border-color: #20242c;
        background: #20242c;
        color: #ffffff;
      }

      .shell-loader__channel-button,
      .shell-loader__history-button {
        background: rgba(255, 255, 255, 0.72);
        color: #374151;
      }

      .shell-loader__channel-button.is-active,
      .shell-loader__history-button.is-active {
        border-color: #20242c;
        background: #ffffff;
        color: #20242c;
        box-shadow: 0 8px 18px rgba(32, 36, 44, 0.1);
      }

      .shell-loader__history {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;
        width: 100%;
      }

      .shell-loader__history-button {
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .shell-loader__node-error {
        min-height: 16px;
        color: #b42318;
        font-size: 12px;
        line-height: 16px;
        text-align: center;
      }

      body.is-loaded iframe {
        opacity: 1;
      }

      body.is-loaded .shell-loader {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      @keyframes shell-spin {
        to { transform: rotate(360deg); }
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #232323;
          color: #f4f4f5;
        }

        iframe {
          background: #232323;
        }

        .shell-loader {
          background: #232323;
        }

        .shell-loader__mark {
          background: #faf9f5;
          color: #20242c;
          box-shadow: 0 14px 34px rgba(0, 0, 0, 0.28);
        }

        .shell-loader__spinner {
          border-color: rgba(250, 249, 245, 0.16);
          border-top-color: #faf9f5;
        }

        .shell-loader__status {
          color: #c9ced6;
        }

        .shell-loader__node-label {
          color: #e5e7eb;
        }

        .shell-loader__node-input {
          border-color: rgba(229, 231, 235, 0.18);
          background: rgba(255, 255, 255, 0.08);
          color: #f4f4f5;
        }

        .shell-loader__node-input:focus {
          border-color: #faf9f5;
          box-shadow: 0 0 0 3px rgba(250, 249, 245, 0.12);
        }

        .shell-loader__node-submit {
          border-color: #faf9f5;
          background: #faf9f5;
          color: #20242c;
        }

        .shell-loader__channel-button,
        .shell-loader__history-button {
          border-color: rgba(229, 231, 235, 0.18);
          background: rgba(255, 255, 255, 0.08);
          color: #e5e7eb;
        }

        .shell-loader__channel-button.is-active,
        .shell-loader__history-button.is-active {
          border-color: #faf9f5;
          background: rgba(250, 249, 245, 0.16);
          color: #ffffff;
          box-shadow: none;
        }

        .shell-loader__node-error {
          color: #fca5a5;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        iframe,
        .shell-loader {
          transition: none;
        }

        .shell-loader__spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell-loader">
      <div class="shell-loader__content">
        <div class="shell-loader__mark" aria-hidden="true">Y</div>
        <div class="shell-loader__spinner" aria-hidden="true"></div>
        <div
          class="shell-loader__status"
          data-loader-status
          role="status"
          aria-live="polite"
        >
          Loading Yep Anywhere
        </div>
        <form class="shell-loader__node-form" data-node-form>
          <label class="shell-loader__node-label" for="shell-node-input">
            Server node
          </label>
          <div class="shell-loader__node-row">
            <input
              class="shell-loader__node-input"
              id="shell-node-input"
              data-node-input
              type="text"
              inputmode="url"
              autocomplete="off"
              autocapitalize="none"
              spellcheck="false"
              placeholder="43.226.60.75:46789"
              aria-describedby="shell-node-error"
            />
            <button class="shell-loader__node-submit" type="submit">
              Connect
            </button>
          </div>
          <div
            class="shell-loader__node-error"
            id="shell-node-error"
            data-node-error
            aria-live="polite"
          ></div>
        </form>
        <div
          class="shell-loader__history"
          data-node-history
          aria-label="Saved nodes"
        ></div>
        <button
          class="shell-loader__channel-button"
          type="button"
          data-http-channel
        >
          HTTPS relay
        </button>
      </div>
    </div>
    <iframe
      id="app-frame"
      allow="clipboard-read; clipboard-write; microphone; camera; fullscreen"
      loading="eager"
      title="Yep Anywhere"
    ></iframe>
  </body>
</html>
